<div class="update-user-container {{context.theme}}">
    <h2>Update User Information</h2>
    <div class="image-show">
        <img [src]="editableUser.profiles" alt="No image">
    </div>
    <form #userDetailsForm="ngForm">
        <div class="form-group">
            <label>ID:</label>
            <input type="text" name="id" readonly class="disabled-field" [(ngModel)]="editableUser.id">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>First Name:</label>
                <input type="text" name="firstName" [(ngModel)]="editableUser.firstName">
            </div>
            <div class="form-group">
                <label>Last Name:</label>
                <input type="text" name="lastName" [(ngModel)]="editableUser.lastName">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Age:</label>
                <input type="number" name="age" min="0" [(ngModel)]="editableUser.age">
            </div>
            <div class="form-group">
                <label>Location:</label>
                <input type="text" name="location" [(ngModel)]="editableUser.location">
            </div>
        </div>

        <div class="form-group">
            <label>Status:</label>
            <select name="status" [(ngModel)]="editableUser.status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>

        <div class="input-group form-group" *ngIf="context.userRole === 'admin'">
            <input type="file" class="form-control" name="profile" (change)="onFileSelect($event)" style="height: auto; padding: 6px; width: auto;">
        </div>

        <div class="button-group">
            <button type="submit" class="btn-update" (click)="updateUserData()">
                <span class="loader" *ngIf="loading"></span>
                <span *ngIf="hideText">Save Changes</span>
            </button>
            <button type="button" class="btn-cancel" (click)="closePopOut()">Cancel</button>
        </div>
    </form>
</div>
