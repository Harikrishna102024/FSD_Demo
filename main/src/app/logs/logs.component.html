<div class="logs">
  <div class="log-container">

    <h2>Application Logs</h2>

    <div class="log-header">
      <span>Time</span>
      <span>Level</span>
      <span>Message</span>
    </div>
  
    <div class="log-body">
      <div class="log-row info" *ngFor="let data of logDetails">
        <span class="{{data.level}}">{{data.timestamp}}</span>
        <span class="{{data.level}}">{{data.level}}</span>
        <span class="{{data.level}}">{{data.message}}</span>
      </div>
    </div>
    
  </div>
</div>
