<div class="updateUserDetails" *ngIf="isUpdateDetails">
    <app-update-user [userData]="updateDetails" (status)="closePopOut($event)"
        (recall)="recallUserData($event)"></app-update-user>
</div>
<div class="container mt-5">
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Age</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Email</th>
                    <th>Profile</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let data of userData" [class.admin-row]="data.role === 'admin'">
                    <td >{{data.id}}</td>
                    <td>{{data.firstName}}</td>
                    <td>{{data.lastName}}</td>
                    <td>{{data.age}}</td>
                    <td>{{data.location}}</td>
                    <td>
                        <span [ngClass]="data.status === 'active' ? 'activeBadge' : 'inactiveBadge'">{{data.status}}</span>
                    </td>
                    <td>{{maskData(data.email)}}</td>
                    <td>
                        <img [src]="data.profiles" alt="No Profile"
                            [ngClass]="data.status === 'active' ? 'active' : 'inactive'"
                            (click)="openImage(data.profiles, data.firstName)">
                    </td>
                    <td [class.edit-table-admin]="context.userRole === 'admin'">
                        <button class="badgeEdit" (click)="updateUserData(data)" [disabled]="context.userRole !== 'admin'  && context.userId != data.id">Edit</button>
                        <button *ngIf="context.userRole === 'admin'" class="badgeDelete" (click)="deleteUserData(data.id)" [disabled]="data.role === 'admin'">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="userData && userData.length === 0" class="tableError">No data available</tr>
            </tbody>
        </table>
        <div class="loader" *ngIf="isLoading"></div>
    </div>
</div>
